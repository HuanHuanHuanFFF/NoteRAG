spring.application.name=NoteRAG
server.port=${SERVER_PORT:9000}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.configuration.map-underscore-to-camel-case=true

spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:none}
spring.ai.model.embedding=${SPRING_AI_MODEL_EMBEDDING:none}
spring.ai.model.image=${SPRING_AI_MODEL_IMAGE:none}
spring.ai.model.audio.speech=${SPRING_AI_MODEL_AUDIO_SPEECH:none}
spring.ai.model.audio.transcription=${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:none}
spring.ai.model.moderation=${SPRING_AI_MODEL_MODERATION:none}
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL}
spring.ai.openai.embedding.options.model=${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL:}

# NoteRAG embedding feature switch.
# Local tests/default startup keep it false so import/chunk can run without external model config.
# Docker/production should set it true, then startup validation requires a Spring AI EmbeddingModel.
noterag.embedding.enabled=${NOTERAG_EMBEDDING_ENABLED:false}
noterag.embedding.provider=${NOTERAG_EMBEDDING_PROVIDER:openai}
noterag.embedding.model-name=${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL:}
noterag.embedding.dimension=${NOTERAG_EMBEDDING_DIMENSION:1024}
noterag.embedding.distance-metric=${NOTERAG_EMBEDDING_DISTANCE_METRIC:cosine}
noterag.embedding.batch-size=${NOTERAG_EMBEDDING_BATCH_SIZE:10}
noterag.embedding.max-batch-size=${NOTERAG_EMBEDDING_MAX_BATCH_SIZE:10}

# Markdown chunking parameters.
noterag.chunking.strategy=${NOTERAG_CHUNKING_STRATEGY:custom}
noterag.chunking.min-target-tokens=${NOTERAG_CHUNKING_MIN_TARGET_TOKENS:300}
noterag.chunking.max-target-tokens=${NOTERAG_CHUNKING_MAX_TARGET_TOKENS:800}
noterag.chunking.hard-max-tokens=${NOTERAG_CHUNKING_HARD_MAX_TOKENS:1000}
noterag.chunking.overlap-chars=${NOTERAG_CHUNKING_OVERLAP_CHARS:80}

# Spring AI default TokenTextSplitter parameters. Only used by strategy=spring-ai-default.
noterag.chunking.spring-ai.chunk-size=${NOTERAG_CHUNKING_SPRING_AI_CHUNK_SIZE:800}
noterag.chunking.spring-ai.min-chunk-size-chars=${NOTERAG_CHUNKING_SPRING_AI_MIN_CHUNK_SIZE_CHARS:350}
noterag.chunking.spring-ai.min-chunk-length-to-embed=${NOTERAG_CHUNKING_SPRING_AI_MIN_CHUNK_LENGTH_TO_EMBED:5}
noterag.chunking.spring-ai.max-num-chunks=${NOTERAG_CHUNKING_SPRING_AI_MAX_NUM_CHUNKS:10000}
noterag.chunking.spring-ai.keep-separator=${NOTERAG_CHUNKING_SPRING_AI_KEEP_SEPARATOR:true}

# Vector retrieval parameters.
noterag.retrieval.default-top-n=${NOTERAG_RETRIEVAL_DEFAULT_TOP_N:20}
noterag.retrieval.max-top-n=${NOTERAG_RETRIEVAL_MAX_TOP_N:50}
