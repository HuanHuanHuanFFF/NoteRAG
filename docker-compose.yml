services:
  db:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: ${POSTGRES_CONTAINER_NAME:-noterag-db}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - noterag-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: ${APP_CONTAINER_NAME:-noterag-app}
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-9000}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      # Docker/production enables embedding by default; set false only for import/chunk-only debugging.
      NOTERAG_EMBEDDING_ENABLED: ${NOTERAG_EMBEDDING_ENABLED:-true}
      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-none}
      SPRING_AI_MODEL_EMBEDDING: ${SPRING_AI_MODEL_EMBEDDING:-none}
      SPRING_AI_MODEL_IMAGE: ${SPRING_AI_MODEL_IMAGE:-none}
      SPRING_AI_MODEL_AUDIO_SPEECH: ${SPRING_AI_MODEL_AUDIO_SPEECH:-none}
      SPRING_AI_MODEL_AUDIO_TRANSCRIPTION: ${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:-none}
      SPRING_AI_MODEL_MODERATION: ${SPRING_AI_MODEL_MODERATION:-none}
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-}
      SPRING_AI_OPENAI_BASE_URL: ${SPRING_AI_OPENAI_BASE_URL:-}
      SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL: ${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL:-}

      # Markdown chunking parameters.
      NOTERAG_CHUNKING_MIN_TARGET_TOKENS: ${NOTERAG_CHUNKING_MIN_TARGET_TOKENS:-300}
      NOTERAG_CHUNKING_MAX_TARGET_TOKENS: ${NOTERAG_CHUNKING_MAX_TARGET_TOKENS:-800}
      NOTERAG_CHUNKING_HARD_MAX_TOKENS: ${NOTERAG_CHUNKING_HARD_MAX_TOKENS:-1000}
      NOTERAG_CHUNKING_OVERLAP_CHARS: ${NOTERAG_CHUNKING_OVERLAP_CHARS:-80}

      # Vector retrieval parameters.
      NOTERAG_RETRIEVAL_DEFAULT_TOP_N: ${NOTERAG_RETRIEVAL_DEFAULT_TOP_N:-20}
      NOTERAG_RETRIEVAL_MAX_TOP_N: ${NOTERAG_RETRIEVAL_MAX_TOP_N:-50}
    ports:
      - "${APP_HOST_PORT:-9000}:${SERVER_PORT:-9000}"

volumes:
  noterag-postgres-data:
